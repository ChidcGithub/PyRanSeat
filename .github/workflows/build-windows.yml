name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Validate application
      run: |
        python -c "import app; print('Import validation passed')"
        python -c "from flask import Flask; print('Flask validation passed')"

    - name: Build executable with PyInstaller
      run: |
        pyinstaller pyranseat.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PyRanSeat-Windows
        path: dist/PyRanSeat.exe
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: PyRanSeat-Windows
        path: ./dist

    - name: Get release info
      id: info
      run: |
        echo "release_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
        echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "commit_sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Get commit message
      id: commit
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
        COMMIT_DATE=$(git log -1 --pretty=format:"%ci")
        
        # Escape for multiline
        COMMIT_MSG="${COMMIT_MSG//'%'/'%25'}"
        COMMIT_MSG="${COMMIT_MSG//$'\n'/'%0A'}"
        COMMIT_MSG="${COMMIT_MSG//$'\r'/'%0D'}"
        
        echo "message=${COMMIT_MSG}" >> $GITHUB_OUTPUT
        echo "author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT
        echo "date=${COMMIT_DATE}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: PyRanSeat ${{ steps.info.outputs.tag_name }}
        files: ./dist/PyRanSeat.exe
        body: |
          ## Release Information
          
          | Item | Value |
          |------|-------|
          | **Version** | ${{ steps.info.outputs.tag_name }} |
          | **Release Time** | ${{ steps.info.outputs.release_time }} |
          | **Commit SHA** | `${{ steps.info.outputs.commit_sha }}` |
          | **Short SHA** | `${{ steps.info.outputs.commit_sha_short }}` |
          
          ## Commit Details
          
          - **Author**: ${{ steps.commit.outputs.author }}
          - **Date**: ${{ steps.commit.outputs.date }}
          - **Message**: ${{ steps.commit.outputs.message }}
          
          ---
          
          ### Download
          
          Download `PyRanSeat.exe` from the assets below.
          
          **Usage**: Double-click to run, the server will start at `http://127.0.0.1:5000`
